<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>F1 Animation</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(#87CEEB 60%, #444 60%);
    }

    /* Road */
    .road {
        position: absolute;
        bottom: 0;
        width: 100%;
        height: 200px;
        background: #333;
        overflow: hidden;
    }

    /* Moving road lines */
    .line {
        position: absolute;
        width: 100%;
        height: 10px;
        background: white;
        top: 50%;
        animation: moveLines 0.5s linear infinite;
    }

    @keyframes moveLines {
        0% { transform: translateX(0); }
        100% { transform: translateX(-200px); }
    }

    /* F1 Car */
    .car {
        position: absolute;
        bottom: 120px;
        left: -300px;
        width: 300px;
        height: 80px;
        animation: drive 5s linear infinite;
    }

    @keyframes drive {
        0% { left: -300px; }
        100% { left: 110%; }
    }

    /* Car Body */
    .body {
        position: absolute;
        width: 220px;
        height: 40px;
        background: red;
        top: 20px;
        left: 40px;
        border-radius: 20px;
    }

    /* Cockpit */
    .cockpit {
        position: absolute;
        width: 60px;
        height: 30px;
        background: black;
        top: 10px;
        left: 90px;
        border-radius: 50%;
    }

    /* Front wing */
    .front-wing {
        position: absolute;
        width: 40px;
        height: 10px;
        background: darkred;
        top: 35px;
        left: 0;
    }

    /* Rear wing */
    .rear-wing {
        position: absolute;
        width: 20px;
        height: 50px;
        background: darkred;
        top: 0;
        left: 260px;
    }

    /* Wheels */
    .wheel {
        position: absolute;
        width: 40px;
        height: 40px;
        background: black;
        border-radius: 50%;
        bottom: 0;
        animation: spin 0.5s linear infinite;
    }

    .wheel.front { left: 50px; }
    .wheel.rear { right: 10px; }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

</style>
</head>
<body>

<div class="road">
    <div class="line"></div>
</div>

<div class="car">
    <div class="front-wing"></div>
    <div class="body"></div>
    <div class="cockpit"></div>
    <div class="rear-wing"></div>
    <div class="wheel front"></div>
    <div class="wheel rear"></div>
</div>

</body>
</html>
